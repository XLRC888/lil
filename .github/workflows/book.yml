name: book
on:
  push:
    branches: [main]
    paths: ['book/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: peaceiris/actions-mdbook@v2
    - run: mdbook build book
    - uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: book/book
